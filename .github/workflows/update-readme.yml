name: Update README

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC
    - cron: "0 18 * * *"  # 18:00 UTC
  workflow_dispatch:       # lets you trigger it manually too

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: mikuchansudo
          GIT_EMAIL: mikuchan111000@gmail.com
          GIT_NAME: mikuchansudo
        run: python scripts/update_readme.py

      - name: Commit and push changes
        run: |
          git config user.email "mikuchan111000@gmail.com"
          git config user.name "mikuchansudo"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "docs: sync profile stats $(date -u '+%Y-%m-%d')"
          git push
